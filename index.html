```html
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
</head>

<body style="background:#020617;color:#fff;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;gap:20px">

<h2>ورود / ثبت‌نام</h2>

<button onclick="loginWithGoogle()" style="padding:12px 20px;border-radius:10px;border:none;background:#8b5cf6;color:#fff;font-size:16px;cursor:pointer">
ورود با گوگل
</button>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🔥 Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyBjGet-li1hqCmkd7OZkkv5e3GEJ_Zp18M",
  authDomain: "salichattest.firebaseapp.com",
  projectId: "salichattest",
  appId: "1:985509042175:web:a29ce14b52956af7acb9ca"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const msg = document.getElementById("msg");

/* 📱 WebView Detection */
function isWebView() {
  const ua = navigator.userAgent;
  return /Instagram|FBAN|FBAV|Twitter|Line|Snapchat|TikTok|WhatsApp|Telegram/.test(ua);
}

/* 💾 Save + Redirect */
function saveAndGo(user) {
  localStorage.setItem("login", "true");
  localStorage.setItem("name", user.displayName || "");
  localStorage.setItem("email", user.email || "");
  localStorage.setItem("photo", user.photoURL || "");
  localStorage.setItem("uid", user.uid || "");

  location.href = "home.html";
}

/* 🔄 Handle Redirect Result */
window.addEventListener("load", () => {
  getRedirectResult(auth)
    .then((result) => {
      if (result && result.user) {
        saveAndGo(result.user);
      }
    })
    .catch((err) => {
      msg.innerText = "خطا: " + err.message;
      console.error(err);
    });
});

/* 🔐 Login */
window.loginWithGoogle = async function () {

  if (isWebView()) {
    alert("لطفاً این صفحه را در Chrome یا Safari باز کنید");
    return;
  }

  try {
    await signInWithRedirect(auth, provider);
  } catch (err) {
    msg.innerText = err.message;
  }
};
</script>

</body>
</html>
```
