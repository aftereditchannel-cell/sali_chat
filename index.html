<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سالی چت</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Segoe UI', Tahoma, sans-serif;
  background: radial-gradient(circle at 15% 15%, rgba(88,28,220,0.45) 0%, transparent 45%),
              radial-gradient(circle at 85% 85%, rgba(139,92,246,0.35) 0%, transparent 45%),
              radial-gradient(circle at 80% 10%, rgba(236,72,153,0.2) 0%, transparent 35%),
              linear-gradient(135deg, #020617 0%, #0f172a 50%, #020617 100%);
  min-height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}
.particle{position:fixed;width:4px;height:4px;border-radius:50%;background:linear-gradient(45deg,#8b5cf6,#22d3ee);opacity:0;animation:floatUp 8s linear infinite;pointer-events:none;}
@keyframes floatUp{0%{transform:translateY(0) scale(0.5);opacity:0;}15%{opacity:0.8;}85%{opacity:0.4;}100%{transform:translateY(-160px) scale(1.3);opacity:0;}}
.mouse-glow{position:fixed;width:350px;height:350px;border-radius:50%;pointer-events:none;background:radial-gradient(circle, rgba(139,92,246,0.2) 0%, transparent 70%);filter:blur(25px);transform:translate(-50%,-50%);transition:left .08s ease, top .08s ease;z-index:0;}
.container{width:100%;max-width:420px;padding:20px;position:relative;z-index:10;}
.glass-box{background:rgba(255,255,255,0.055);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:28px;padding:32px 26px 28px;box-shadow:0 25px 60px rgba(0,0,0,0.65),0 0 0 1px rgba(255,255,255,0.07),inset 0 1px 0 rgba(255,255,255,0.08);}
.logo{text-align:center;margin-bottom:28px;}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#8b5cf6,#ec4899);border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:10px;box-shadow:0 8px 25px rgba(139,92,246,0.4);}
.logo h1{color:#fff;font-size:18px;font-weight:700;}
.logo span{color:#a78bfa;font-size:12px;}
.tabs{display:flex;background:rgba(0,0,0,0.3);border-radius:14px;padding:4px;margin-bottom:26px;gap:4px;}
.tab-btn{flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .25s ease;}
.tab-btn.active{background:linear-gradient(90deg,#8b5cf6,#ec4899);color:#fff;box-shadow:0 4px 14px rgba(139,92,246,0.4);}
.panel{display:none;}
.panel.active{display:block;}
.form-group{margin-bottom:16px;}
label{color:#9ca3af;font-size:12px;font-weight:500;display:block;margin-bottom:7px;}
input{width:100%;padding:13px 15px;border-radius:13px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.05);color:#fff;font-size:14px;outline:none;}
input:focus{border-color:rgba(139,92,246,0.5);box-shadow:0 0 0 3px rgba(139,92,246,0.12);background:rgba(255,255,255,0.07);}
.primary-btn{width:100%;padding:13px;border:none;border-radius:14px;background:linear-gradient(90deg,#8b5cf6,#ec4899);color:#fff;font-weight:600;font-size:14px;cursor:pointer;transition:all .25s ease;margin-top:4px;}
.primary-btn:disabled{opacity:0.45;cursor:not-allowed;background:#4b5563;}
.msg{padding:11px 14px;border-radius:11px;font-size:12.5px;margin-top:14px;line-height:1.6;display:none;}
.msg.error{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;}
.msg.success{background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.2);color:#67e8f9;}
.msg.show{display:block;}
#loading-overlay{display:none;position:fixed;inset:0;background:rgba(2,6,23,0.85);backdrop-filter:blur(8px);z-index:9999;justify-content:center;align-items:center;flex-direction:column;gap:16px;}
#loading-overlay.active{display:flex;}
.spinner{width:44px;height:44px;border:3px solid rgba(139,92,246,0.15);border-top-color:#8b5cf6;border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#verify-screen{display:none;position:fixed;inset:0;background:radial-gradient(circle at 30% 30%, rgba(88,28,220,0.4), transparent 50%),linear-gradient(135deg,#020617,#0f172a);z-index:9997;justify-content:center;align-items:center;padding:24px;}
.verify-box{background:rgba(255,255,255,0.06);backdrop-filter:blur(40px);border-radius:28px;padding:36px 26px;box-shadow:0 25px 60px rgba(0,0,0,0.65),0 0 0 1px rgba(255,255,255,0.08);text-align:center;max-width:360px;width:100%;}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-text">در حال پردازش...</p>
</div>

<!-- Verify Screen -->
<div id="verify-screen">
  <div class="verify-box">
    <span style="font-size:56px;display:block;margin-bottom:18px;">📧</span>
    <h3>ایمیلت رو تأیید کن</h3>
    <p>ایمیل تأیید به <strong id="verify-email-shown"></strong> ارسال شد.</p>
    <div style="display:flex;flex-direction:column;gap:12px;margin-top:25px;">
      <button class="primary-btn" onclick="checkVerified()">✅ تأیید کردم، ادامه بده</button>
      <button onclick="resendVerification()" style="padding:12px;background:transparent;border:1px solid #8b5cf6;color:#a78bfa;border-radius:12px;cursor:pointer;">📨 ارسال مجدد</button>
      <button onclick="cancelVerify()" style="padding:12px;background:transparent;border:1px solid rgba(255,255,255,0.3);color:#9ca3af;border-radius:12px;cursor:pointer;">↩ برگشت</button>
    </div>
    <div id="verify-msg" style="margin-top:15px;font-size:13px;min-height:24px;color:#a78bfa;"></div>
  </div>
</div>

<div class="container">
  <div class="logo">
    <div class="logo-icon">💬</div>
    <h1>سالی چت</h1>
    <span>ورود یا ثبت‌نام</span>
  </div>
  <div class="glass-box">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">ورود</button>
      <button class="tab-btn" onclick="switchTab('signup')">ثبت‌نام</button>
    </div>

    <!-- Login -->
    <div class="panel active" id="panel-login">
      <div class="form-group"><label>ایمیل</label><input type="email" id="login-email" placeholder="email@example.com" oninput="validateLogin()"></div>
      <div class="form-group"><label>رمز عبور</label><input type="password" id="login-password" placeholder="••••••••" oninput="validateLogin()"></div>
      <button class="primary-btn" id="login-btn" onclick="loginWithEmail()">ورود</button>
      <div class="msg" id="msg-login"></div>
    </div>

    <!-- Signup -->
    <div class="panel" id="panel-signup">
      <div class="form-group"><label>نام کاربری (حداقل ۳ کاراکتر)</label><input type="text" id="signup-name" placeholder="مثلاً: Amir" oninput="validateSignup()"></div>
      <div class="form-group"><label>ایمیل</label><input type="email" id="signup-email" placeholder="email@example.com" oninput="validateSignup()"></div>
      <div class="form-group"><label>رمز عبور (حداقل ۶ کاراکتر)</label><input type="password" id="signup-password" placeholder="••••••••" oninput="validateSignup()"></div>
      <button class="primary-btn" id="signup-btn" onclick="signupWithEmail()" disabled>ثبت‌نام</button>
      <div class="msg" id="msg-signup"></div>
    </div>
  </div>
</div>

<script>
// Helper Functions
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
  });
  document.getElementById('panel-login').classList.toggle('active', tab === 'login');
  document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
  clearMessages();
}

function clearMessages() {
  document.querySelectorAll('.msg').forEach(m => m.classList.remove('show'));
}

function showMsg(id, text, type = 'error') {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type} show`;
}

function validateSignup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const btn = document.getElementById('signup-btn');
  btn.disabled = !(name.length >= 3 && email.length > 5 && password.length >= 6);
}

function validateLogin() {}

// Mouse Glow
const glow = document.createElement('div'); glow.className = 'mouse-glow'; document.body.appendChild(glow);
document.addEventListener('mousemove', e => { glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px'; });
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendEmailVerification,
  updateProfile,
  reload
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBjGet-li1hqCmkd7OZkkv5e3GEJ_Zp18M",
  authDomain: "salichattest.firebaseapp.com",
  projectId: "salichattest",
  storageBucket: "salichattest.firebasestorage.app",
  messagingSenderId: "985509042175",
  appId: "1:985509042175:web:a29ce14b52956af7acb9ca"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let pendingUser = null;
const overlay = document.getElementById('loading-overlay');
const loadingText = document.getElementById('loading-text');

function setLoading(on, text = 'در حال پردازش...') {
  loadingText.textContent = text;
  overlay.classList.toggle('active', on);
}

function saveUserData(user, password = "") {
  localStorage.setItem("salichat_login", "true");
  localStorage.setItem("salichat_uid", user.uid || "");
  localStorage.setItem("salichat_name", user.displayName || "");
  localStorage.setItem("salichat_email", user.email || "");
  localStorage.setItem("salichat_photo", user.photoURL || "");
  // ذخیره رمز در localStorage (فقط برای تست)
  if (password) localStorage.setItem("salichat_password", password);
}

async function saveUserProfile(user, displayName, password) {
  try {
    await setDoc(doc(db, "users", user.uid), {
      uid: user.uid,
      displayName: displayName,
      email: user.email,
      password: password,           // ← رمز عبور به صورت plaintext
      createdAt: new Date().toISOString(),
      lastLogin: new Date().toISOString()
    }, { merge: true });
    console.log("✅ رمز عبور به صورت plaintext در Firestore ذخیره شد.");
  } catch (e) { console.error(e); }
}

/* ثبت‌نام */
window.signupWithEmail = async function () {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;

  if (name.length < 3) return showMsg('msg-signup', '⚠️ نام کاربری حداقل ۳ کاراکتر باشد.', 'error');
  if (!email) return showMsg('msg-signup', '⚠️ ایمیل را وارد کنید.', 'error');
  if (password.length < 6) return showMsg('msg-signup', '⚠️ رمز عبور حداقل ۶ کاراکتر باشد.', 'error');

  clearMessages();
  setLoading(true, 'در حال ثبت‌نام...');
  document.getElementById('signup-btn').disabled = true;

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    const user = cred.user;

    await updateProfile(user, { displayName: name });
    await sendEmailVerification(user);
    await saveUserProfile(user, name, password);   // ذخیره plaintext

    pendingUser = user;
    document.getElementById('verify-email-shown').textContent = email;
    setLoading(false);
    document.getElementById('verify-screen').classList.add('active');
  } catch (err) {
    setLoading(false);
    document.getElementById('signup-btn').disabled = false;

    if (err.code === 'auth/email-already-in-use') {
      showMsg('msg-signup', '❌ این ایمیل قبلاً ثبت شده. در حال انتقال به ورود...', 'error');
      setTimeout(() => switchTab('login'), 1600);
    } else {
      showMsg('msg-signup', err.message, 'error');
    }
  }
};

/* ورود */
window.loginWithEmail = async function () {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  if (!email || !password) return showMsg('msg-login', '⚠️ ایمیل و رمز عبور را وارد کنید.', 'error');

  clearMessages();
  setLoading(true, 'در حال ورود...');
  document.getElementById('login-btn').disabled = true;

  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const user = cred.user;

    if (!user.emailVerified) {
      pendingUser = user;
      document.getElementById('verify-email-shown').textContent = email;
      setLoading(false);
      document.getElementById('verify-screen').classList.add('active');
      document.getElementById('login-btn').disabled = false;
      return;
    }

    saveUserData(user, password);
    location.href = "home.html";
  } catch (err) {
    setLoading(false);
    document.getElementById('login-btn').disabled = false;

    if (err.code === 'auth/user-not-found') {
      showMsg('msg-login', '❌ این ایمیل ثبت‌نام نشده. در حال انتقال به ثبت‌نام...', 'error');
      setTimeout(() => switchTab('signup'), 1800);
    } else {
      showMsg('msg-login', err.message, 'error');
    }
  }
};

/* بقیه توابع */
window.checkVerified = async function () {
  if (!pendingUser) return;
  setLoading(true);
  try {
    await reload(pendingUser);
    if (pendingUser.emailVerified) {
      saveUserData(pendingUser);
      location.href = "home.html";
    } else {
      setLoading(false);
      document.getElementById('verify-msg').textContent = '❌ هنوز ایمیل را تأیید نکرده‌اید.';
    }
  } catch (err) {
    setLoading(false);
    document.getElementById('verify-msg').textContent = '❌ خطا در بررسی.';
  }
};

window.resendVerification = async function () {
  if (!pendingUser) return;
  try {
    await sendEmailVerification(pendingUser);
    document.getElementById('verify-msg').textContent = '✅ ایمیل مجددا ارسال شد!';
  } catch (e) {}
};

window.cancelVerify = function () {
  pendingUser = null;
  document.getElementById('verify-screen').classList.remove('active');
};
</script>
</body>
</html>
