<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سالی چت</title>
<style>
/* همان استایل‌های قبلی */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Segoe UI', Tahoma, sans-serif;
  background:
    radial-gradient(circle at 15% 15%, rgba(88,28,220,0.45) 0%, transparent 45%),
    radial-gradient(circle at 85% 85%, rgba(139,92,246,0.35) 0%, transparent 45%),
    radial-gradient(circle at 80% 10%, rgba(236,72,153,0.2) 0%, transparent 35%),
    linear-gradient(135deg, #020617 0%, #0f172a 50%, #020617 100%);
  min-height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}
/* Particles */
.particle{
  position:fixed;
  width:4px;height:4px;
  border-radius:50%;
  background:linear-gradient(45deg,#8b5cf6,#22d3ee);
  opacity:0;
  animation:floatUp 8s linear infinite;
  pointer-events:none;
}
@keyframes floatUp{
  0%{transform:translateY(0) scale(0.5);opacity:0;}
  15%{opacity:0.8;}
  85%{opacity:0.4;}
  100%{transform:translateY(-160px) scale(1.3);opacity:0;}
}
/* Mouse Glow */
.mouse-glow{
  position:fixed;
  width:350px;height:350px;
  border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle, rgba(139,92,246,0.2) 0%, transparent 70%);
  filter:blur(25px);
  transform:translate(-50%,-50%);
  transition:left .08s ease, top .08s ease;
  z-index:0;
}
/* Container */
.container{
  width:100%;
  max-width:420px;
  padding:20px;
  position:relative;
  z-index:10;
}
/* Logo */
.logo{
  text-align:center;
  margin-bottom:28px;
}
.logo-icon{
  width:56px;height:56px;
  background:linear-gradient(135deg,#8b5cf6,#ec4899);
  border-radius:18px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  margin-bottom:10px;
  box-shadow:0 8px 25px rgba(139,92,246,0.4);
}
.logo h1{
  color:#fff;
  font-size:18px;
  font-weight:700;
  letter-spacing:0.5px;
}
.logo span{
  color:#a78bfa;
  font-size:12px;
}
/* Glass Box */
.glass-box{
  background:rgba(255,255,255,0.055);
  backdrop-filter:blur(40px);
  border-radius:28px;
  padding:32px 26px 28px;
  box-shadow:0 25px 60px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.07);
}
/* Tabs */
.tabs{
  display:flex;
  background:rgba(0,0,0,0.3);
  border-radius:14px;
  padding:4px;
  margin-bottom:26px;
  gap:4px;
}
.tab-btn{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:all .25s ease;
}
.tab-btn.active{
  background:linear-gradient(90deg,#8b5cf6,#ec4899);
  color:#fff;
  box-shadow:0 4px 14px rgba(139,92,246,0.4);
}
.tab-btn:not(.active){
  background:transparent;
  color:#666;
}
/* Form */
.panel{display:none;}
.panel.active{display:block;}
.form-group{margin-bottom:16px;}
label{
  color:#9ca3af;
  font-size:12px;
  font-weight:500;
  display:block;
  margin-bottom:7px;
}
input{
  width:100%;
  padding:13px 15px;
  border-radius:13px;
  border:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.05);
  color:#fff;
  font-size:14px;
  outline:none;
}
input:focus{
  border-color:rgba(139,92,246,0.5);
  box-shadow:0 0 0 3px rgba(139,92,246,0.12);
}
/* Buttons */
.primary-btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#8b5cf6,#ec4899);
  color:#fff;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  margin-top:4px;
}
.primary-btn:disabled{
  opacity:0.45;
  cursor:not-allowed;
}
.google-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:13px;
  border-radius:14px;
  background:rgba(255,255,255,0.92);
  color:#1f2937;
  font-weight:600;
  cursor:pointer;
  width:100%;
  border:none;
  font-size:14px;
  margin-top:8px;
}
.google-btn:hover{
  transform:translateY(-2px);
}
.google-btn img{width:20px;height:20px;}
/* Messages */
.msg{
  padding:11px 14px;
  border-radius:11px;
  font-size:12.5px;
  margin-top:14px;
  display:none;
}
.msg.error{
  background:rgba(239,68,68,0.12);
  border:1px solid rgba(239,68,68,0.25);
  color:#fca5a5;
}
.msg.show{display:block;}
/* Loading */
#loading-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(2,6,23,0.85);
  backdrop-filter:blur(8px);
  z-index:9999;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:16px;
}
#loading-overlay.active{display:flex;}
.spinner{
  width:44px;height:44px;
  border:3px solid rgba(139,92,246,0.15);
  border-top-color:#8b5cf6;
  border-radius:50%;
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
/* Verify Screen */
#verify-screen{
  display:none;
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 30% 30%, rgba(88,28,220,0.4), transparent 50%), linear-gradient(135deg,#020617,#0f172a);
  z-index:9997;
  justify-content:center;
  align-items:center;
  padding:24px;
}
#verify-screen.active{display:flex;}
.verify-box{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(40px);
  border-radius:28px;
  padding:36px 26px;
  box-shadow:0 25px 60px rgba(0,0,0,0.65);
  text-align:center;
  max-width:360px;
  width:100%;
}
</style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-text">در حال پردازش...</p>
</div>

<!-- Email Verify Screen -->
<div id="verify-screen">
  <div class="verify-box">
    <span class="verify-icon" style="font-size:56px;display:block;margin-bottom:18px;">📧</span>
    <h3 style="color:#fff;font-size:19px;margin-bottom:10px;">ایمیلت رو تأیید کن</h3>
    <p style="color:#9ca3af;font-size:13px;line-height:1.85;margin-bottom:22px;">
      یه ایمیل تأیید به آدرس<br>
      <strong id="verify-email-shown"></strong><br>
      فرستادیم. روی لینک توی ایمیل کلیک کن.
    </p>
    <div class="verify-actions" style="display:flex;flex-direction:column;gap:10px;">
      <button class="primary-btn" onclick="checkVerified()">✅ تأیید کردم، ورود کن</button>
      <button onclick="resendVerification()" style="padding:11px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:#9ca3af;border-radius:12px;cursor:pointer;">📨 ارسال مجدد</button>
      <button onclick="cancelVerify()" style="padding:11px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:#9ca3af;border-radius:12px;cursor:pointer;">↩ برگشت</button>
    </div>
    <div id="verify-msg" style="font-size:12px;margin-top:12px;color:#a78bfa;"></div>
  </div>
</div>

<div class="container">
  <div class="logo">
    <div class="logo-icon">💬</div>
    <h1>سالی چت</h1>
    <span>ورود یا ثبت‌نام</span>
  </div>

  <div class="glass-box">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">ورود</button>
      <button class="tab-btn" onclick="switchTab('signup')">ثبت‌نام</button>
    </div>

    <!-- Login Panel -->
    <div class="panel active" id="panel-login">
      <div class="form-group">
        <label>ایمیل</label>
        <input type="email" id="login-email" placeholder="email@example.com">
      </div>
      <div class="form-group">
        <label>رمز عبور</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="primary-btn" id="login-btn" onclick="loginWithEmail()">ورود</button>
      <div class="divider" style="display:flex;align-items:center;gap:12px;margin:20px 0;color:#4b5563;font-size:12px;">
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.07);"></div>
        <span>یا</span>
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.07);"></div>
      </div>
      <button class="google-btn" onclick="signInWithGoogle()">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
        ورود با گوگل
      </button>
      <div class="msg" id="msg-login"></div>
    </div>

    <!-- Signup Panel -->
    <div class="panel" id="panel-signup">
      <div class="form-group">
        <label>نام کاربری</label>
        <input type="text" id="signup-name" placeholder="مثلاً: Amir">
      </div>
      <div class="form-group">
        <label>ایمیل</label>
        <input type="email" id="signup-email" placeholder="email@example.com">
      </div>
      <div class="form-group">
        <label>رمز عبور (حداقل ۶ کاراکتر)</label>
        <input type="password" id="signup-password" placeholder="••••••••">
      </div>
      <button class="primary-btn" id="signup-btn" onclick="signupWithEmail()">ثبت‌نام</button>
      <div class="divider" style="display:flex;align-items:center;gap:12px;margin:20px 0;color:#4b5563;font-size:12px;">
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.07);"></div>
        <span>یا</span>
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.07);"></div>
      </div>
      <button class="google-btn" onclick="signInWithGoogle()">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
        ثبت‌نام با گوگل
      </button>
      <div class="msg" id="msg-signup"></div>
    </div>
  </div>
</div>

<script>
// Mouse glow + Particles
const glow = document.createElement('div');
glow.className = 'mouse-glow';
document.body.appendChild(glow);
document.addEventListener('mousemove', e => {
  glow.style.left = e.clientX + 'px';
  glow.style.top = e.clientY + 'px';
});
setInterval(() => {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = (Math.random() * 100) + 'vw';
  p.style.bottom = '-10px';
  p.style.animationDuration = (6 + Math.random() * 5) + 's';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 12000);
}, 300);

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
  });
  document.getElementById('panel-login').classList.toggle('active', tab === 'login');
  document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
  clearMessages();
}

function clearMessages() {
  document.querySelectorAll('.msg').forEach(m => m.classList.remove('show'));
}

function showMsg(id, text, type = 'error') {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type} show`;
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signInWithPopup,
  signInWithRedirect,
  GoogleAuthProvider,
  sendEmailVerification,
  updateProfile,
  reload
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBjGet-li1hqCmkd7OZkkv5e3GEJ_Zp18M",
  authDomain: "salichattest.firebaseapp.com",
  projectId: "salichattest",
  storageBucket: "salichattest.firebasestorage.app",
  messagingSenderId: "985509042175",
  appId: "1:985509042175:web:a29ce14b52956af7acb9ca"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const googleProvider = new GoogleAuthProvider();
googleProvider.setCustomParameters({ prompt: 'select_account' });

let pendingUser = null;
const overlay = document.getElementById('loading-overlay');
const loadingText = document.getElementById('loading-text');

function setLoading(on, text = 'در حال پردازش...') {
  loadingText.textContent = text;
  overlay.classList.toggle('active', on);
}

// ذخیره پروفایل با تضمین ذخیره ایمیل
async function saveUserProfile(user, displayName, method = "email", password = null) {
  try {
    const collectionName = method === "google" ? "google_users" : "users";
    
    const userRef = doc(db, collectionName, user.uid);
    await setDoc(userRef, {
      uid: user.uid,
      displayName: displayName || user.displayName || "کاربر جدید",
      email: user.email || null,           // ← ایمیل همیشه ذخیره می‌شود
      photoURL: user.photoURL || null,
      method: method,
      createdAt: new Date().toISOString(),
      lastLogin: new Date().toISOString(),
      bio: "",
      status: "active",
      ...(password && { password })
    }, { merge: true });

    console.log(`✅ ذخیره شد در ${collectionName} | ایمیل: ${user.email}`);
    return true;
  } catch (error) {
    console.error("خطا در ذخیره:", error);
    return false;
  }
}

async function updateLastLogin(user) {
  try {
    const userRef = doc(db, "users", user.uid);
    await setDoc(userRef, { lastLogin: new Date().toISOString() }, { merge: true });
  } catch (e) {}
}

function saveAndGo(user) {
  localStorage.setItem("salichat_login", "true");
  localStorage.setItem("salichat_name", user.displayName || "");
  localStorage.setItem("salichat_email", user.email || "");
  localStorage.setItem("salichat_photo", user.photoURL || "");
  localStorage.setItem("salichat_uid", user.uid || "");
  location.href = "home.html";
}

// ==================== ثبت‌نام با ایمیل ====================
window.signupWithEmail = async function () {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;

  if (!name || !email || password.length < 6) {
    return showMsg('msg-signup', '⚠️ همه فیلدها را پر کنید.', 'error');
  }

  setLoading(true, 'در حال ثبت‌نام...');
  document.getElementById('signup-btn').disabled = true;

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    const user = cred.user;
    await updateProfile(user, { displayName: name });
    await sendEmailVerification(user);
    await saveUserProfile(user, name, "email", password);

    pendingUser = user;
    document.getElementById('verify-email-shown').textContent = email;
    setLoading(false);
    document.getElementById('verify-screen').classList.add('active');
  } catch (err) {
    setLoading(false);
    document.getElementById('signup-btn').disabled = false;
    showMsg('msg-signup', translateError(err.code), 'error');
  }
};

// ==================== ورود با ایمیل ====================
window.loginWithEmail = async function () {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  if (!email || !password) {
    return showMsg('msg-login', '⚠️ ایمیل و رمز عبور را وارد کنید.', 'error');
  }

  setLoading(true, 'در حال ورود...');
  document.getElementById('login-btn').disabled = true;

  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const user = cred.user;

    if (!user.emailVerified) {
      pendingUser = user;
      document.getElementById('verify-email-shown').textContent = email;
      setLoading(false);
      document.getElementById('verify-screen').classList.add('active');
      return;
    }

    await updateLastLogin(user);
    saveAndGo(user);
  } catch (err) {
    setLoading(false);
    document.getElementById('login-btn').disabled = false;
    showMsg('msg-login', translateError(err.code), 'error');
  }
};

// ==================== ورود با گوگل ====================
window.signInWithGoogle = async function () {
  setLoading(true, 'در حال اتصال به گوگل...');
  clearMessages();

  try {
    const result = await signInWithPopup(auth, googleProvider);
    await handleGoogleSuccess(result.user);
  } catch (error) {
    console.warn("Popup Error:", error.code);
    if (error.code === 'auth/popup-blocked' || error.code === 'auth/operation-not-allowed') {
      try {
        await signInWithRedirect(auth, googleProvider);
      } catch (e) {
        setLoading(false);
        showMsg('msg-login', '❌ لطفاً پاپ‌آپ مرورگر را فعال کنید.', 'error');
      }
    } else {
      setLoading(false);
      showMsg('msg-login', translateError(error.code), 'error');
    }
  }
};

async function handleGoogleSuccess(user) {
  if (!user) return;
  const success = await saveUserProfile(user, user.displayName, "google");
  if (success) {
    await updateLastLogin(user);
    saveAndGo(user);
  } else {
    setLoading(false);
    showMsg('msg-login', '❌ خطا در ذخیره اطلاعات.', 'error');
  }
}

// ==================== توابع تأیید ایمیل ====================
window.checkVerified = async function () {
  if (!pendingUser) return;
  setLoading(true, 'در حال بررسی...');
  try {
    await reload(pendingUser);
    if (pendingUser.emailVerified) {
      await updateLastLogin(pendingUser);
      saveAndGo(pendingUser);
    } else {
      setLoading(false);
      document.getElementById('verify-msg').textContent = '❌ هنوز ایمیل تأیید نشده است.';
    }
  } catch (err) {
    setLoading(false);
    document.getElementById('verify-msg').textContent = '❌ خطا در بررسی.';
  }
};

window.resendVerification = async function () {
  if (!pendingUser) return;
  try {
    await sendEmailVerification(pendingUser);
    document.getElementById('verify-msg').textContent = '✅ ایمیل دوباره ارسال شد!';
    setTimeout(() => document.getElementById('verify-msg').textContent = '', 4000);
  } catch (err) {
    document.getElementById('verify-msg').textContent = '❌ ' + translateError(err.code);
  }
};

window.cancelVerify = function () {
  if (pendingUser) try { pendingUser.delete(); } catch (_) {}
  pendingUser = null;
  document.getElementById('verify-screen').classList.remove('active');
};

function translateError(code) {
  const errors = {
    'auth/email-already-in-use': '❌ این ایمیل قبلاً ثبت شده است.',
    'auth/invalid-email': '❌ فرمت ایمیل اشتباه است.',
    'auth/weak-password': '❌ رمز عبور خیلی ضعیف است.',
    'auth/user-not-found': '❌ این ایمیل ثبت نشده است.',
    'auth/wrong-password': '❌ رمز عبور اشتباه است.',
    'auth/popup-blocked': '❌ پنجره گوگل بلاک شده است.',
    'auth/network-request-failed': '📶 مشکل اینترنت.',
    'auth/too-many-requests': '⚠️ تلاش زیاد! کمی صبر کنید.',
  };
  return errors[code] || '❌ خطا: ' + code;
}
</script>
</body>
</html>
