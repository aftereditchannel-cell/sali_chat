<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 سالی چت 🌸</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{
  height:100vh;
  background:radial-gradient(circle at center,#0b0120,#02010a);
  display:flex;align-items:center;justify-content:center;
  color:white;overflow:hidden;
}
canvas{position:fixed;top:0;left:0;}
.container{
  text-align:center;position:relative;z-index:2;
  padding:60px 20px;
}
.logo{
  width:140px;height:140px;border-radius:30px;
  overflow:hidden;margin:auto;
  box-shadow:0 0 80px rgba(168,85,247,0.7);
}
.logo img{width:100%;height:100%;object-fit:cover;}
h1{margin-top:20px;font-size:42px;}
p{margin-top:10px;color:#aaa;}
.percent{margin-top:20px;font-size:20px;}

.tag{
  position:absolute;
  transform:translate(-50%,-50%);
  padding:8px 14px;
  border-radius:999px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.2);
  white-space:nowrap;
  font-size:14px;
}

/* موبایل */
@media(max-width:600px){
  .logo{width:100px;height:100px;}
  h1{font-size:28px;}
  .tag{font-size:12px;padding:6px 10px;}
}
</style>
</head>

<body>

<canvas id="galaxy"></canvas>

<div class="container" id="container">
  <div class="logo">
    <img src="https://uploadkon.ir/uploads/4c4414_26ChatGPT-Image-Jun-13-2026-03-10-56-PM.png">
  </div>
  <h1>Sali Chat</h1>
  <p>به دنیای خودت خوش اومدی</p>
  <div class="percent" id="percent">0%</div>
</div>

<script>
const labels=[
"🏳️‍🌈 Gay","🌸 Lesbian","🕺💃 Straight","✨ Bisexual",
"⚡ Tomboy","🤍 Femboy","👀 Non-binary","🌈 Trans"
];

const container=document.getElementById("container");
let tags=[];

function createTags(){
  tags.forEach(t=>t.remove());
  tags=[];

  const W=window.innerWidth;
  const H=window.innerHeight;

  // فضای امن وسط (لوگو + متن)
  const safeCenter=Math.min(W,H)*0.35;

  // حداقل فاصله بین دکمه‌ها
  const gap=20;
  const approxBtnWidth = W < 600 ? 80 : 110;

  // شعاع بر اساس جلوگیری از overlap
  let minRadius=(labels.length*(approxBtnWidth+gap))/(2*Math.PI);

  // شعاع اصلی
  let radius=Math.min(W,H)/2 - safeCenter;

  // انتخاب بزرگتر برای جلوگیری از overlap
  radius=Math.max(radius,minRadius);

  // ولی از صفحه بیرون نزنه
  radius=Math.min(radius, Math.min(W,H)/2 - 40);

  labels.forEach((text,i)=>{
    let el=document.createElement("div");
    el.className="tag";
    el.innerText=text;

    let angle=(i/labels.length)*Math.PI*2;

    let offsetX = -40;
    let x=Math.cos(angle)*radius + offsetX;
    let y=Math.sin(angle)*radius;

    el.style.left=`calc(50% + ${x}px)`;
    el.style.top=`calc(50% + ${y}px)`;

    animate(el);

    container.appendChild(el);
    tags.push(el);
  });
}

function animate(el){
  let t=Math.random()*100;
  function move(){
    t+=0.01;
    let dx=Math.sin(t)*6;
    let dy=Math.cos(t*1.3)*6;
    el.style.transform=`translate(${dx}px,${dy}px)`;
    requestAnimationFrame(move);
  }
  move();
}

window.addEventListener("resize",createTags);
createTags();

/* galaxy */
const c=document.getElementById("galaxy");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let stars=[];
for(let i=0;i<120;i++){
  stars.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    s:Math.random()*2,
    sp:Math.random()*0.5+0.2
  });
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  stars.forEach(st=>{
    st.y-=st.sp;
    if(st.y<0){st.y=c.height;st.x=Math.random()*c.width;}
    ctx.beginPath();
    ctx.arc(st.x,st.y,st.s,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

/* loading */
let p=0;
let el=document.getElementById("percent");
let int=setInterval(()=>{
  p++;
  el.innerText=p+"%";
  if(p>=100)clearInterval(int);
},30);

setTimeout(()=>{
  window.location.href="SaliChat_Login_Final.html";
},7000);

</script>

</body>
</html>
