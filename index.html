<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سالی چت</title>
<style>
/* همان استایل‌های قبلی (بدون تغییر) */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Segoe UI', Tahoma, sans-serif;
  background:
    radial-gradient(circle at 15% 15%, rgba(88,28,220,0.45) 0%, transparent 45%),
    radial-gradient(circle at 85% 85%, rgba(139,92,246,0.35) 0%, transparent 45%),
    radial-gradient(circle at 80% 10%, rgba(236,72,153,0.2) 0%, transparent 35%),
    linear-gradient(135deg, #020617 0%, #0f172a 50%, #020617 100%);
  min-height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}
/* ===== PARTICLES ===== */
.particle{
  position:fixed;
  width:4px;height:4px;
  border-radius:50%;
  background:linear-gradient(45deg,#8b5cf6,#22d3ee);
  opacity:0;
  animation:floatUp 8s linear infinite;
  pointer-events:none;
}
@keyframes floatUp{
  0%{transform:translateY(0) scale(0.5);opacity:0;}
  15%{opacity:0.8;}
  85%{opacity:0.4;}
  100%{transform:translateY(-160px) scale(1.3);opacity:0;}
}
/* ===== MOUSE GLOW ===== */
.mouse-glow{
  position:fixed;
  width:350px;height:350px;
  border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle, rgba(139,92,246,0.2) 0%, transparent 70%);
  filter:blur(25px);
  transform:translate(-50%,-50%);
  transition:left .08s ease, top .08s ease;
  z-index:0;
}
/* ===== CONTAINER ===== */
.container{
  width:100%;
  max-width:420px;
  padding:20px;
  position:relative;
  z-index:10;
}
/* ===== LOGO ===== */
.logo{
  text-align:center;
  margin-bottom:28px;
}
.logo-icon{
  width:56px;height:56px;
  background:linear-gradient(135deg,#8b5cf6,#ec4899);
  border-radius:18px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  margin-bottom:10px;
  box-shadow:0 8px 25px rgba(139,92,246,0.4);
}
.logo h1{
  color:#fff;
  font-size:18px;
  font-weight:700;
  letter-spacing:0.5px;
}
.logo span{
  color:#a78bfa;
  font-size:12px;
}
/* ===== GLASS BOX ===== */
.glass-box{
  background:rgba(255,255,255,0.055);
  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  border-radius:28px;
  padding:32px 26px 28px;
  box-shadow:
    0 25px 60px rgba(0,0,0,0.65),
    0 0 0 1px rgba(255,255,255,0.07),
    inset 0 1px 0 rgba(255,255,255,0.08);
}
/* ===== TAB SWITCHER ===== */
.tabs{
  display:flex;
  background:rgba(0,0,0,0.3);
  border-radius:14px;
  padding:4px;
  margin-bottom:26px;
  gap:4px;
}
.tab-btn{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:all .25s ease;
  font-family:inherit;
}
.tab-btn.active{
  background:linear-gradient(90deg,#8b5cf6,#ec4899);
  color:#fff;
  box-shadow:0 4px 14px rgba(139,92,246,0.4);
}
.tab-btn:not(.active){
  background:transparent;
  color:#666;
}
.tab-btn:not(.active):hover{color:#aaa;}
/* ===== FORM PANEL ===== */
.panel{display:none;}
.panel.active{display:block;}
/* ===== FORM GROUPS ===== */
.form-group{margin-bottom:16px;}
label{
  color:#9ca3af;
  font-size:12px;
  font-weight:500;
  display:block;
  margin-bottom:7px;
}
input{
  width:100%;
  padding:13px 15px;
  border-radius:13px;
  border:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.05);
  color:#fff;
  font-size:14px;
  font-family:inherit;
  transition:border-color .2s, box-shadow .2s;
  outline:none;
}
input:focus{
  border-color:rgba(139,92,246,0.5);
  box-shadow:0 0 0 3px rgba(139,92,246,0.12);
  background:rgba(255,255,255,0.07);
}
input::placeholder{color:#4b5563;}
input:disabled{
  opacity:0.35;
  cursor:not-allowed;
}
/* ===== PRIMARY BUTTON ===== */
.primary-btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#8b5cf6,#ec4899);
  color:#fff;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  font-family:inherit;
  transition:all .25s ease;
  box-shadow:0 4px 16px rgba(139,92,246,0.35);
  margin-top:4px;
}
.primary-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(139,92,246,0.5);
}
.primary-btn:active{transform:translateY(0);}
.primary-btn:disabled{
  opacity:0.45;
  cursor:not-allowed;
  transform:none;
  box-shadow:none;
}
/* ===== DIVIDER ===== */
.divider{
  display:flex;
  align-items:center;
  gap:12px;
  margin:20px 0;
  color:#4b5563;
  font-size:12px;
}
.divider::before,.divider::after{
  content:"";
  flex:1;
  height:1px;
  background:rgba(255,255,255,0.07);
}
/* ===== GOOGLE BTN ===== */
.google-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:13px;
  border-radius:14px;
  background:rgba(255,255,255,0.92);
  color:#1f2937;
  font-weight:600;
  cursor:pointer;
  width:100%;
  border:none;
  font-size:14px;
  font-family:inherit;
  transition:all .25s ease;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.google-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
}
.google-btn img{width:20px;height:20px;}
/* ===== DISABLED NOTICE ===== */
.disabled-notice{
  text-align:center;
  color:#6b7280;
  font-size:11px;
  margin-top:10px;
  padding:10px 14px;
  background:rgba(255,255,255,0.03);
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.04);
  line-height:1.7;
  display:none;
}
/* ===== ERROR / SUCCESS MESSAGES ===== */
.msg{
  padding:11px 14px;
  border-radius:11px;
  font-size:12.5px;
  margin-top:14px;
  line-height:1.6;
  display:none;
}
.msg.error{
  background:rgba(239,68,68,0.12);
  border:1px solid rgba(239,68,68,0.25);
  color:#fca5a5;
}
.msg.success{
  background:rgba(34,211,238,0.1);
  border:1px solid rgba(34,211,238,0.2);
  color:#67e8f9;
}
.msg.show{display:block;}
/* ===== LOADING OVERLAY ===== */
#loading-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(2,6,23,0.85);
  backdrop-filter:blur(8px);
  z-index:9999;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:16px;
}
#loading-overlay.active{display:flex;}
.spinner{
  width:44px;height:44px;
  border:3px solid rgba(139,92,246,0.15);
  border-top-color:#8b5cf6;
  border-radius:50%;
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
#loading-overlay p{
  color:#a78bfa;
  font-size:13px;
  font-family:'Segoe UI', Tahoma, sans-serif;
}
/* ===== EMAIL VERIFY SCREEN ===== */
#verify-screen{
  display:none;
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 30% 30%, rgba(88,28,220,0.4), transparent 50%),
    linear-gradient(135deg,#020617,#0f172a);
  z-index:9997;
  justify-content:center;
  align-items:center;
  padding:24px;
}
#verify-screen.active{display:flex;}
.verify-box{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  border-radius:28px;
  padding:36px 26px;
  box-shadow:0 25px 60px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.08);
  text-align:center;
  max-width:360px;
  width:100%;
}
.verify-icon{font-size:56px;margin-bottom:18px;display:block;}
.verify-box h3{color:#fff;font-size:19px;margin-bottom:10px;font-weight:700;}
.verify-box p{color:#9ca3af;font-size:13px;line-height:1.85;margin-bottom:22px;}
.verify-box strong{color:#e5e7eb;}
.verify-actions{display:flex;flex-direction:column;gap:10px;}
.verify-btn-main{
  padding:13px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#8b5cf6,#ec4899);
  color:#fff;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  font-family:inherit;
  transition:opacity .2s;
}
.verify-btn-main:active{opacity:.75;}
.verify-btn-sec{
  padding:11px;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  background:transparent;
  color:#9ca3af;
  font-size:13px;
  cursor:pointer;
  font-family:inherit;
  transition:color .2s;
}
.verify-btn-sec:hover{color:#fff;}
#verify-msg{
  font-size:12px;
  margin-top:12px;
  min-height:18px;
  color:#a78bfa;
}
</style>
</head>
<body>
<!-- Loading -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-text">در حال پردازش...</p>
</div>

<!-- Email Verify Screen -->
<div id="verify-screen">
  <div class="verify-box">
    <span class="verify-icon">📧</span>
    <h3>ایمیلت رو تأیید کن</h3>
    <p>
      یه ایمیل تأیید به آدرس<br>
      <strong id="verify-email-shown"></strong><br>
      فرستادیم. روی لینک توی ایمیل کلیک کن، بعد دکمه پایین رو بزن.
    </p>
    <div class="verify-actions">
      <button class="verify-btn-main" onclick="checkVerified()">✅ تأیید کردم، ورود کن</button>
      <button class="verify-btn-sec" onclick="resendVerification()">📨 ارسال مجدد ایمیل</button>
      <button class="verify-btn-sec" onclick="cancelVerify()">↩ برگشت</button>
    </div>
    <div id="verify-msg"></div>
  </div>
</div>

<div class="container">
  <div class="logo">
    <div class="logo-icon">💬</div>
    <h1>سالی چت</h1>
    <span>ورود یا ثبت‌نام</span>
  </div>
  <div class="glass-box">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">ورود</button>
      <button class="tab-btn" onclick="switchTab('signup')">ثبت‌نام</button>
    </div>

    <!-- LOGIN PANEL -->
    <div class="panel active" id="panel-login">
      <div class="form-group">
        <label>ایمیل</label>
        <input type="email" id="login-email" placeholder="email@example.com">
      </div>
      <div class="form-group">
        <label>رمز عبور</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="primary-btn" id="login-btn" onclick="loginWithEmail()">ورود</button>
      <div class="divider">یا</div>
      <button class="google-btn" onclick="signInWithGoogle()">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
        ورود با گوگل
      </button>
      <div class="msg" id="msg-login"></div>
    </div>

    <!-- SIGNUP PANEL -->
    <div class="panel" id="panel-signup">
      <div class="form-group">
        <label>نام کاربری</label>
        <input type="text" id="signup-name" placeholder="مثلاً: Amir">
      </div>
      <div class="form-group">
        <label>ایمیل</label>
        <input type="email" id="signup-email" placeholder="email@example.com">
      </div>
      <div class="form-group">
        <label>رمز عبور (حداقل ۶ کاراکتر)</label>
        <input type="password" id="signup-password" placeholder="••••••••">
      </div>
      <button class="primary-btn" id="signup-btn" onclick="signupWithEmail()">ثبت‌نام</button>
      <div class="divider">یا</div>
      <button class="google-btn" onclick="signInWithGoogle()">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
        ثبت‌نام با گوگل
      </button>
      <div class="msg" id="msg-signup"></div>
    </div>
  </div>
</div>

<script>
// Mouse glow + Particles
const glow = document.createElement('div');
glow.className = 'mouse-glow';
document.body.appendChild(glow);
document.addEventListener('mousemove', e => {
  glow.style.left = e.clientX + 'px';
  glow.style.top = e.clientY + 'px';
});
setInterval(() => {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = (Math.random() * 100) + 'vw';
  p.style.bottom = '-10px';
  p.style.animationDuration = (6 + Math.random() * 5) + 's';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 12000);
}, 300);

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
  });
  document.getElementById('panel-login').classList.toggle('active', tab === 'login');
  document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
  clearMessages();
}

function clearMessages() {
  document.querySelectorAll('.msg').forEach(m => m.classList.remove('show'));
}

function showMsg(id, text, type = 'error') {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type} show`;
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signInWithPopup,
  GoogleAuthProvider,
  sendEmailVerification,
  updateProfile,
  reload
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBjGet-li1hqCmkd7OZkkv5e3GEJ_Zp18M",
  authDomain: "salichattest.firebaseapp.com",
  projectId: "salichattest",
  storageBucket: "salichattest.firebasestorage.app",
  messagingSenderId: "985509042175",
  appId: "1:985509042175:web:a29ce14b52956af7acb9ca"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const googleProvider = new GoogleAuthProvider();

let pendingUser = null;
const overlay = document.getElementById('loading-overlay');
const loadingText = document.getElementById('loading-text');

function setLoading(on, text = 'در حال پردازش...') {
  loadingText.textContent = text;
  overlay.classList.toggle('active', on);
}

// ==================== ذخیره در Firestore ====================
async function saveUserProfile(user, displayName, method = "email", password = null) {
  try {
    const collectionName = method === "google" ? "google_users" : "users";
    
    const userRef = doc(db, collectionName, user.uid);
    await setDoc(userRef, {
      uid: user.uid,
      displayName: displayName || user.displayName,
      email: user.email,
      photoURL: user.photoURL || null,
      method: method,
      createdAt: new Date().toISOString(),
      lastLogin: new Date().toISOString(),
      bio: "",
      status: "active",
      ...(password && { password }) // فقط برای ایمیل
    }, { merge: true });

    console.log(`✅ کاربر در مجموعه ${collectionName} ذخیره شد`);
  } catch (error) {
    console.error("خطا در ذخیره پروفایل:", error);
  }
}

async function updateLastLogin(user) {
  try {
    const userRef = doc(db, "users", user.uid); // آخرین ورود همیشه در users
    await setDoc(userRef, { lastLogin: new Date().toISOString() }, { merge: true });
  } catch (e) {
    console.error(e);
  }
}

function saveAndGo(user) {
  localStorage.setItem("salichat_login", "true");
  localStorage.setItem("salichat_name", user.displayName || "");
  localStorage.setItem("salichat_email", user.email || "");
  localStorage.setItem("salichat_photo", user.photoURL || "");
  localStorage.setItem("salichat_uid", user.uid || "");
  location.href = "home.html";
}

// ==================== ثبت‌نام با ایمیل ====================
window.signupWithEmail = async function () {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;

  if (!name || !email || password.length < 6) {
    return showMsg('msg-signup', '⚠️ لطفاً همه فیلدها را به درستی پر کنید.', 'error');
  }

  setLoading(true, 'در حال ثبت‌نام...');
  document.getElementById('signup-btn').disabled = true;

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    const user = cred.user;
    await updateProfile(user, { displayName: name });
    await sendEmailVerification(user);
    await saveUserProfile(user, name, "email", password);

    pendingUser = user;
    document.getElementById('verify-email-shown').textContent = email;
    setLoading(false);
    document.getElementById('verify-screen').classList.add('active');
  } catch (err) {
    setLoading(false);
    document.getElementById('signup-btn').disabled = false;
    showMsg('msg-signup', translateError(err.code), 'error');
  }
};

// ==================== ورود با ایمیل ====================
window.loginWithEmail = async function () {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  if (!email || !password) {
    return showMsg('msg-login', '⚠️ لطفاً ایمیل و رمز عبور را وارد کنید.', 'error');
  }

  setLoading(true, 'در حال ورود...');
  document.getElementById('login-btn').disabled = true;

  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const user = cred.user;

    if (!user.emailVerified) {
      pendingUser = user;
      document.getElementById('verify-email-shown').textContent = email;
      setLoading(false);
      document.getElementById('verify-screen').classList.add('active');
      return;
    }

    await updateLastLogin(user);
    saveAndGo(user);
  } catch (err) {
    setLoading(false);
    document.getElementById('login-btn').disabled = false;
    showMsg('msg-login', translateError(err.code), 'error');
  }
};

// ==================== ورود/ثبت‌نام با گوگل ====================
window.signInWithGoogle = async function () {
  setLoading(true, 'در حال اتصال به گوگل...');

  try {
    // تلاش با Popup (سریع‌تر)
    const result = await signInWithPopup(auth, googleProvider);
    const user = result.user;

    await saveUserProfile(user, user.displayName, "google");
    await updateLastLogin(user);
    saveAndGo(user);

  } catch (error) {
    console.warn("Popup failed:", error.code);

    // fallback به Redirect (بهتر برای ایران و برخی مرورگرها)
    if (error.code === 'auth/popup-blocked' || error.code === 'auth/operation-not-allowed') {
      try {
        await signInWithRedirect(auth, googleProvider); // نیاز به مدیریت redirect در صفحه جداگانه دارد
      } catch (redirectErr) {
        setLoading(false);
        showMsg('msg-login', '❌ خطا در ورود با گوگل. لطفاً از مرورگر Chrome استفاده کنید.', 'error');
      }
    } else {
      setLoading(false);
      showMsg('msg-login', translateError(error.code), 'error');
    }
  }
};

// ==================== توابع تأیید ایمیل ====================
window.checkVerified = async function () {
  if (!pendingUser) return;
  setLoading(true, 'در حال بررسی...');
  try {
    await reload(pendingUser);
    if (pendingUser.emailVerified) {
      await updateLastLogin(pendingUser);
      saveAndGo(pendingUser);
    } else {
      setLoading(false);
      document.getElementById('verify-msg').textContent = '❌ هنوز ایمیل تأیید نشده است.';
    }
  } catch (err) {
    setLoading(false);
    document.getElementById('verify-msg').textContent = '❌ خطا در بررسی.';
  }
};

window.resendVerification = async function () {
  if (!pendingUser) return;
  try {
    await sendEmailVerification(pendingUser);
    document.getElementById('verify-msg').textContent = '✅ ایمیل دوباره ارسال شد!';
    setTimeout(() => document.getElementById('verify-msg').textContent = '', 4000);
  } catch (err) {
    document.getElementById('verify-msg').textContent = '❌ ' + translateError(err.code);
  }
};

window.cancelVerify = function () {
  if (pendingUser) {
    try { pendingUser.delete(); } catch (_) {}
  }
  pendingUser = null;
  document.getElementById('verify-screen').classList.remove('active');
};

function translateError(code) {
  const errors = {
    'auth/email-already-in-use': '❌ این ایمیل قبلاً ثبت شده است.',
    'auth/invalid-email': '❌ فرمت ایمیل اشتباه است.',
    'auth/weak-password': '❌ رمز عبور خیلی ضعیف است.',
    'auth/user-not-found': '❌ این ایمیل ثبت نشده است.',
    'auth/wrong-password': '❌ رمز عبور اشتباه است.',
    'auth/popup-blocked': '❌ پنجره پاپ‌آپ مسدود شده است. پاپ‌آپ را اجازه دهید.',
    'auth/network-request-failed': '📶 مشکل اتصال اینترنت.',
    'auth/too-many-requests': '⚠️ تلاش زیاد! کمی صبر کنید.',
  };
  return errors[code] || '❌ خطای ناشناخته: ' + code;
}
</script>
