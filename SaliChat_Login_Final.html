<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👀 Sali Login</title>
<style>
/* ریست و استایل پایه */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(139,92,246,0.55) 0%, transparent 50%),
    radial-gradient(circle at 80% 30%, rgba(236,72,153,0.45) 0%, transparent 55%),
    radial-gradient(circle at 40% 80%, rgba(59,130,246,0.35) 0%, transparent 50%),
    linear-gradient(135deg, #0f172a 0%, #1e2937 50%, #0f172a 100%);
  min-height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow-y:auto;
  position:relative;
  padding:20px 0;
  color:#f1f5f9;
}

/* Particles */
.particle{
  position:fixed;
  width:5px;height:5px;
  border-radius:50%;
  background:linear-gradient(45deg,#c084fc,#67e8f9,#f472b6);
  opacity:0;
  animation:floatUp 7s linear infinite;
  pointer-events:none;
  box-shadow:0 0 8px rgba(192,132,252,0.6);
}
@keyframes floatUp{
  0%{transform:translateY(0) scale(0.6);opacity:0;}
  20%{opacity:0.9;}
  80%{opacity:0.5;}
  100%{transform:translateY(-180px) scale(1.4);opacity:0;}
}

/* Mouse Glow */
.mouse-glow{
  position:fixed;
  width:420px;height:420px;
  border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle, rgba(167,139,250,0.25) 0%, rgba(139,92,246,0.12) 40%, transparent 70%);
  filter:blur(35px);
  transform:translate(-50%,-50%);
  transition:left .1s ease, top .1s ease;
  z-index:1;
  mix-blend-mode:screen;
}

/* Container */
.container{
  width:100%;
  max-width:440px;
  padding:20px;
  position:relative;
  z-index:10;
}

/* Logo */
.logo{
  text-align:center;
  margin-bottom:32px;
}
.logo-icon{
  width:68px;height:68px;
  background:linear-gradient(135deg,#a855f7,#ec4899,#3b82f6);
  border-radius:22px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  margin-bottom:12px;
  box-shadow:0 10px 30px rgba(168,85,247,0.5),
             inset 0 -4px 8px rgba(255,255,255,0.3);
  border:1px solid rgba(255,255,255,0.15);
}
.logo h1{
  color:#fff;
  font-size:22px;
  font-weight:800;
  letter-spacing:0.8px;
  text-shadow:0 2px 10px rgba(139,92,246,0.4);
}
.logo span{
  color:#c4b5fd;
  font-size:13px;
  font-weight:500;
  opacity:0.9;
}

/* Glass Box */
.glass-box{
  background:rgba(15,23,42,0.65);
  backdrop-filter:blur(42px);
  border-radius:32px;
  padding:32px 26px 28px;
  box-shadow:0 30px 70px rgba(0,0,0,0.7),
             0 0 0 1.5px rgba(255,255,255,0.1),
             inset 0 2px 0 rgba(255,255,255,0.08);
  border:1px solid rgba(148,163,184,0.1);
}

/* Tabs */
.tabs{
  display:flex;
  background:rgba(0,0,0,0.35);
  border-radius:16px;
  padding:5px;
  margin-bottom:28px;
  gap:5px;
  box-shadow:inset 0 2px 4px rgba(0,0,0,0.3);
}
.tab-btn{
  flex:1;
  padding:13px 12px;
  border:none;
  border-radius:12px;
  font-size:14.5px;
  font-weight:700;
  cursor:pointer;
  transition:all .3s cubic-bezier(0.4,0,0.2,1);
  line-height:1.3;
}
.tab-btn.active{
  background:linear-gradient(90deg,#a855f7,#ec4899);
  color:#fff;
  box-shadow:0 6px 16px rgba(168,85,247,0.45);
  transform:translateY(-1px);
}
.tab-btn:not(.active){
  background:transparent;
  color:#94a3b8;
}

/* Form */
.panel{display:none;}
.panel.active{display:block;}
.form-group{margin-bottom:18px;}
label{
  color:#e0e7ff;
  font-size:13px;
  font-weight:600;
  display:block;
  margin-bottom:7px;
  letter-spacing:0.3px;
}
input{
  width:100%;
  padding:14px 16px;
  border-radius:16px;
  border:1.5px solid rgba(148,163,184,0.2);
  background:rgba(15,23,42,0.7);
  color:#f1f5f9;
  font-size:15px;
  outline:none;
  transition:all .25s ease;
}
input:focus{
  border-color:#a855f7;
  box-shadow:0 0 0 4px rgba(168,85,247,0.18);
  background:rgba(30,41,59,0.9);
}

/* Buttons */
.primary-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:16px;
  background:linear-gradient(90deg,#a855f7,#ec4899);
  color:#fff;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  margin-top:8px;
  box-shadow:0 8px 20px rgba(168,85,247,0.4);
  transition:all .3s ease;
}
.primary-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 25px rgba(168,85,247,0.5);
}
.primary-btn:disabled{
  opacity:0.5;
  cursor:not-allowed;
  transform:none;
}

.google-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:13px;
  border-radius:16px;
  background:rgba(255,255,255,0.95);
  color:#1f2937;
  font-weight:600;
  cursor:pointer;
  width:100%;
  border:1px solid rgba(0,0,0,0.1);
  font-size:15px;
  margin-top:12px;
  transition:all .3s ease;
}
.google-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(0,0,0,0.15);
}
.google-btn img{width:22px;height:22px;}

/* Divider */
.divider{
  display:flex;
  align-items:center;
  gap:12px;
  margin:24px 0;
  color:#64748b;
  font-size:13px;
  font-weight:500;
}
.divider div{
  flex:1;
  height:1px;
  background:linear-gradient(to right, transparent, rgba(148,163,184,0.3), transparent);
}

/* Messages */
.msg{
  padding:12px 16px;
  border-radius:14px;
  font-size:13.5px;
  margin-top:16px;
  display:none;
  font-weight:500;
}
.msg.error{
  background:rgba(248,113,113,0.15);
  border:1px solid rgba(248,113,113,0.3);
  color:#fda4af;
}
.msg.show{display:block;}

/* Loading */
#loading-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(15,23,42,0.92);
  backdrop-filter:blur(12px);
  z-index:9999;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:18px;
}
#loading-overlay.active{display:flex;}
.spinner{
  width:52px;height:52px;
  border:4px solid rgba(168,85,247,0.2);
  border-top-color:#a855f7;
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
#loading-text{
  color:#c4b5fd;
  font-size:15px;
  font-weight:500;
}

/* Verify Screen */
#verify-screen{
  display:none;
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 35% 25%, rgba(139,92,246,0.5), transparent 60%),
             linear-gradient(135deg,#0f172a,#1e2937);
  z-index:9998;
  justify-content:center;
  align-items:center;
  padding:20px;
}
#verify-screen.active{display:flex;}
.verify-box{
  background:rgba(15,23,42,0.75);
  backdrop-filter:blur(40px);
  border-radius:32px;
  padding:36px 28px;
  box-shadow:0 30px 70px rgba(0,0,0,0.75),
             0 0 0 1px rgba(255,255,255,0.1);
  text-align:center;
  max-width:380px;
  width:100%;
  border:1px solid rgba(148,163,184,0.15);
}
.verify-icon{
  font-size:62px;
  margin-bottom:20px;
  display:block;
}
</style>
</head>
<body>
<!-- Loading Overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-text">در حال پردازش...</p>
</div>

<!-- Email Verify Screen -->
<div id="verify-screen">
  <div class="verify-box">
    <span class="verify-icon">📧</span>
    <h3 style="color:#fff;font-size:21px;margin-bottom:12px;font-weight:700;">ایمیلت رو تأیید کن</h3>
    <p style="color:#cbd5e1;font-size:14px;line-height:1.75;margin-bottom:26px;">
      یه ایمیل تأیید به آدرس<br>
      <strong id="verify-email-shown" style="color:#e0e7ff;"></strong><br>
      فرستادیم. روی لینک داخل ایمیل کلیک کن.
    </p>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <button class="primary-btn" onclick="checkVerified()">✅ تأیید کردم، ادامه بده</button>
      <button onclick="resendVerification()" style="padding:13px;border:1.5px solid rgba(148,163,184,0.25);background:transparent;color:#cbd5e1;border-radius:16px;cursor:pointer;font-weight:600;">📨 دوباره بفرست</button>
      <button onclick="cancelVerify()" style="padding:13px;border:1.5px solid rgba(148,163,184,0.25);background:transparent;color:#cbd5e1;border-radius:16px;cursor:pointer;font-weight:600;">↩ برگشت</button>
    </div>
    <div id="verify-msg" style="font-size:13px;margin-top:16px;color:#c4b5fd;"></div>
  </div>
</div>

<div class="container">
  <div class="logo">
    <div class="logo-icon">👀</div>
    <h1>سالی چت</h1>
    <span>ورود به دنیای جدید</span>
  </div>

  <div class="glass-box">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">از اون قدیمی هاشم</button>
      <button class="tab-btn" onclick="switchTab('signup')">کاربر جدیدم</button>
    </div>

    <!-- Login Panel -->
    <div class="panel active" id="panel-login">
      <div class="form-group">
        <label>آدرس ایمیل لطفا🥱</label>
        <input type="email" id="login-email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label> رمزت چی بود؟ 🥷</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="primary-btn" id="login-btn" onclick="loginWithEmail()">لتس گوو 🫠</button>
    
      <div class="divider">
        <div></div>
        <span>و یا</span>
        <div></div>
      </div>
    
      <button class="google-btn" onclick="signInWithGoogle()">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
        ورود با گوگول 🥰
      </button>
      <div class="msg" id="msg-login"></div>
    </div>

    <!-- Signup Panel -->
    <div class="panel" id="panel-signup">
      <div class="form-group">
        <label>چی صدات کنیم هوم؟ 🤔</label>
        <input type="text" id="signup-name" placeholder="مثلاً امیر">
      </div>
      <div class="form-group">
        <label>یه ایمیل بم بده 📧</label>
        <input type="email" id="signup-email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label>رمز عبور (حداقل ۶ کاراکتر عاموو)🔐</label>
        <input type="password" id="signup-password" placeholder="••••••••">
      </div>
      <button class="primary-btn" id="signup-btn" onclick="signupWithEmail()">بزن بریم🕺</button>
    
      <div class="divider">
        <div></div>
        <span>یا</span>
        <div></div>
      </div>
    
      <button class="google-btn" onclick="signInWithGoogle()">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
       ثبت‌نام با گوگول 😘
      </button>
      <div class="msg" id="msg-signup"></div>
    </div>
  </div>
</div>

<script>
// Mouse glow + Particles
const glow = document.createElement('div');
glow.className = 'mouse-glow';
document.body.appendChild(glow);

document.addEventListener('mousemove', e => {
  glow.style.left = e.clientX + 'px';
  glow.style.top = e.clientY + 'px';
});

setInterval(() => {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = (Math.random() * 100) + 'vw';
  p.style.bottom = '-20px';
  p.style.animationDuration = (5 + Math.random() * 6) + 's';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 13000);
}, 280);

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
  });
  document.getElementById('panel-login').classList.toggle('active', tab === 'login');
  document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
  clearMessages();
}

function clearMessages() {
  document.querySelectorAll('.msg').forEach(m => m.classList.remove('show'));
}

function showMsg(id, text, type = 'error') {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type} show`;
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signInWithPopup,
  signInWithRedirect,
  GoogleAuthProvider,
  sendEmailVerification,
  updateProfile,
  reload
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBjGet-li1hqCmkd7OZkkv5e3GEJ_Zp18M",
  authDomain: "salichattest.firebaseapp.com",
  projectId: "salichattest",
  storageBucket: "salichattest.firebasestorage.app",
  messagingSenderId: "985509042175",
  appId: "1:985509042175:web:a29ce14b52956af7acb9ca"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const googleProvider = new GoogleAuthProvider();
googleProvider.setCustomParameters({ prompt: 'select_account' });

let pendingUser = null;
const overlay = document.getElementById('loading-overlay');
const loadingText = document.getElementById('loading-text');

function setLoading(on, text = 'در حال پردازش...') {
  loadingText.textContent = text;
  overlay.classList.toggle('active', on);
}

async function saveUserProfile(user, displayName, method = "email", password = null) {
  try {
    const collectionName = method === "google" ? "google_users" : "users";
    const userRef = doc(db, collectionName, user.uid);
   
    const data = {
      uid: user.uid,
      displayName: displayName || user.displayName || "کاربر جدید",
      email: user.email || null,
      photoURL: user.photoURL || null,
      method: method,
      createdAt: new Date().toISOString(),
      lastLogin: new Date().toISOString(),
      bio: "",
      status: "active",
    };
    if (method === "email" && password) {
      data.password = password;
    }
    await setDoc(userRef, data, { merge: true });
    return true;
  } catch (error) {
    console.error("خطا در ذخیره پروفایل:", error);
    return false;
  }
}

async function saveLoginEntry(user) {
  try {
    const loginRef = doc(db, "logins", user.uid);
    const existing = await getDoc(loginRef);
   
    const loginData = {
      uid: user.uid,
      displayName: user.displayName || "نامشخص",
      email: user.email,
      lastLogin: new Date().toISOString(),
      loginCount: (existing.exists() ? (existing.data().loginCount || 0) : 0) + 1,
      loginHistory: existing.exists()
        ? [...(existing.data().loginHistory || []), new Date().toISOString()]
        : [new Date().toISOString()]
    };
    await setDoc(loginRef, loginData, { merge: true });
    return true;
  } catch (e) {
    console.error("خطا در ذخیره لاگین:", e);
    return false;
  }
}

function saveAndGo(user) {
  localStorage.setItem("salichat_login", "true");
  localStorage.setItem("salichat_name", user.displayName || "");
  localStorage.setItem("salichat_email", user.email || "");
  localStorage.setItem("salichat_photo", user.photoURL || "");
  localStorage.setItem("salichat_uid", user.uid || "");
  location.href = "home.html";
}

// ثبت‌نام با ایمیل
window.signupWithEmail = async function () {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  if (!name || !email || password.length < 6) {
    return showMsg('msg-signup', '⚠️ همه فیلدها را پر کن لطفا.', 'error');
  }
  setLoading(true, 'در حال ثبت‌نام...');
  document.getElementById('signup-btn').disabled = true;
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    const user = cred.user;
    await updateProfile(user, { displayName: name });
    await sendEmailVerification(user);
   
    await saveUserProfile(user, name, "email", password);
   
    pendingUser = user;
    document.getElementById('verify-email-shown').textContent = email;
    setLoading(false);
    document.getElementById('verify-screen').classList.add('active');
  } catch (err) {
    setLoading(false);
    document.getElementById('signup-btn').disabled = false;
    showMsg('msg-signup', translateError(err.code), 'error');
  }
};

// ورود با ایمیل
window.loginWithEmail = async function () {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) {
    return showMsg('msg-login', '⚠️ ایمیل و رمز عبور را وارد کنن.', 'error');
  }
  setLoading(true, 'بزا ببینم موتونم واردت کنم...');
  document.getElementById('login-btn').disabled = true;
  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const user = cred.user;
    if (!user.emailVerified) {
      pendingUser = user;
      document.getElementById('verify-email-shown').textContent = email;
      setLoading(false);
      document.getElementById('verify-screen').classList.add('active');
      return;
    }
    await saveLoginEntry(user);
    const userRef = doc(db, "users", user.uid);
    await setDoc(userRef, { lastLogin: new Date().toISOString() }, { merge: true });
    saveAndGo(user);
  } catch (err) {
    setLoading(false);
    document.getElementById('login-btn').disabled = false;
    showMsg('msg-login', translateError(err.code), 'error');
  }
};

// ورود با گوگل
window.signInWithGoogle = async function () {
  setLoading(true, 'اینجا ایرانه بصبر به گوگول وصل شم....');
  clearMessages();
  try {
    const result = await signInWithPopup(auth, googleProvider);
    await handleGoogleSuccess(result.user);
  } catch (error) {
    console.warn("Popup Error:", error.code);
    if (error.code === 'auth/popup-blocked' || error.code === 'auth/operation-not-allowed') {
      try {
        await signInWithRedirect(auth, googleProvider);
      } catch (e) {
        setLoading(false);
        showMsg('msg-login', '❌ لطفاً پاپ‌آپ مرورگر را فعال کنید.', 'error');
      }
    } else {
      setLoading(false);
      showMsg('msg-login', translateError(error.code), 'error');
    }
  }
};

async function handleGoogleSuccess(user) {
  if (!user) return;
  const success = await saveUserProfile(user, user.displayName, "google");
  if (success) {
    await saveLoginEntry(user);
    saveAndGo(user);
  } else {
    setLoading(false);
    showMsg('msg-login', '❌ خطا در ذخیره اطلاعات.', 'error');
  }
}

async function updateLastLogin(user) {
  try {
    const userRef = doc(db, "users", user.uid);
    await setDoc(userRef, { lastLogin: new Date().toISOString() }, { merge: true });
  } catch (e) {}
}

// توابع تأیید ایمیل
window.checkVerified = async function () {
  if (!pendingUser) return;
  setLoading(true, 'بزار ببینم میشناسم تولو 😄');
  try {
    await reload(pendingUser);
    if (pendingUser.emailVerified) {
      await saveLoginEntry(pendingUser);
      saveAndGo(pendingUser);
    } else {
      setLoading(false);
      document.getElementById('verify-msg').textContent = '😛 دولوخ گو ایمیلیت تایید نشده';
    }
  } catch (err) {
    setLoading(false);
    document.getElementById('verify-msg').textContent = '❌ خطا در بررسی.';
  }
};

window.resendVerification = async function () {
  if (!pendingUser) return;
  try {
    await sendEmailVerification(pendingUser);
    document.getElementById('verify-msg').textContent = '✅ ایمیل دوباره ارسال شد!';
    setTimeout(() => document.getElementById('verify-msg').textContent = '', 4000);
  } catch (err) {
    document.getElementById('verify-msg').textContent = '❌ ' + translateError(err.code);
  }
};

window.cancelVerify = function () {
  if (pendingUser) try { pendingUser.delete(); } catch (_) {}
  pendingUser = null;
  document.getElementById('verify-screen').classList.remove('active');
};

function translateError(code) {
  const errors = {
    'auth/email-already-in-use': '🤓 این ایمیل قبلاً ثبت شده برو وارد شو',
    'auth/invalid-email': '😑 ایمیل آخه این شکلیه؟ من مسخرتم؟',
    'auth/weak-password': '🥰 رمز عبور خیلی ضعیفه.',
    'auth/user-not-found': '🥱 این ایمیل تاحالا ثبت نام نکرده',
