<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👀 سالی چت</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: rgb(5, 5, 16);
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  position: relative;
}

/* Phone Frame */
.phone {
  width: 390px;
  height: 844px;
  background: rgb(10, 10, 20);
  border-radius: 44px;
  box-shadow: 
    rgba(168, 85, 247, 0.15) 0px 0px 0px 1px,
    rgba(0, 0, 0, 0.8) 0px 40px 120px,
    rgba(168, 85, 247, 0.1) 0px 0px 60px inset;
  overflow: hidden;
  position: relative;
  border: 8px solid #111;
}

/* Status Bar */
.status-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 44px;
  padding-top: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 28px;
  color: rgb(155, 142, 196);
  font-size: 13px;
  font-weight: 600;
  z-index: 50;
}

/* Main Content */
.content {
  height: 100%;
  background: linear-gradient(160deg, rgb(13, 8, 32) 0%, rgb(10, 10, 20) 100%);
  display: flex;
  flex-direction: column;
  padding: 60px 24px 40px;
  position: relative;
}

/* Logo */
.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo-icon {
  width: 68px;
  height: 68px;
  background: linear-gradient(135deg, #a855f7, #ec4899);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 16px;
  box-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
}

/* Tabs */
.tabs {
  display: flex;
  background: rgba(0,0,0,0.3);
  border-radius: 14px;
  padding: 4px;
  margin-bottom: 28px;
}
.tab-btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}
.tab-btn.active {
  background: linear-gradient(90deg, #a855f7, #ec4899);
  color: white;
  box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
}

/* Form */
.form-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.input-group label {
  display: block;
  color: #9b8ec4;
  font-size: 13px;
  margin-bottom: 8px;
  font-weight: 500;
}
.input-wrapper {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(168, 85, 247, 0.25);
  border-radius: 18px;
  overflow: hidden;
  position: relative;
}
input {
  width: 100%;
  padding: 16px 18px;
  background: transparent;
  border: none;
  color: #f0eeff;
  font-size: 15px;
}
input::placeholder { color: #9b8ec4; }

/* Button */
.primary-btn {
  margin-top: 8px;
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
  color: white;
  font-weight: 600;
  font-size: 16px;
  border: none;
  border-radius: 18px;
  box-shadow: 0 8px 32px rgba(168, 85, 247, 0.4);
  cursor: pointer;
  transition: all 0.2s;
}
.primary-btn:hover { transform: translateY(-2px); }

/* Divider & Social */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  color: #9b8ec4;
  font-size: 13px;
  margin: 12px 0;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08);
}
.socials {
  display: flex;
  gap: 12px;
}
.social-btn {
  flex: 1;
  padding: 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  color: #f0eeff;
  font-size: 18px;
  cursor: pointer;
}
.social-btn:hover { background: rgba(255,255,255,0.12); }

/* Footer */
.footer {
  text-align: center;
  color: #9b8ec4;
  font-size: 14px;
  margin-top: auto;
}
.footer a { color: #a855f7; font-weight: 600; }
</style>
</head>
<body>

<div class="phone">
  <div class="status-bar">
    <span>۹:۴۱</span>
    <div>●●● 🔋</div>
  </div>

  <div class="content">
    <div class="logo">
      <div class="logo-icon">💜</div>
      <h1>خوش آمدی</h1>
      <p style="color:#9b8ec4; font-size:15px;">به سالی چت</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(0)">ورود</button>
      <button class="tab-btn" onclick="switchTab(1)">ثبت‌نام</button>
    </div>

    <!-- Login Form -->
    <div id="login-form" class="form-container">
      <div class="input-group">
        <label>نام کاربری یا ایمیل</label>
        <div class="input-wrapper"><input type="email" id="login-email" placeholder="example@email.com"></div>
      </div>
      <div class="input-group">
        <label>رمز عبور</label>
        <div class="input-wrapper"><input type="password" id="login-password" placeholder="••••••••"></div>
      </div>
      <button class="primary-btn" onclick="loginWithEmail()">ورود به حساب</button>
      
      <div class="divider">یا</div>
      
      <button class="social-btn" onclick="signInWithGoogle()">G ورود با گوگل</button>
    </div>

    <!-- Signup Form -->
    <div id="signup-form" class="form-container" style="display:none;">
      <div class="input-group">
        <label>نام و نام خانوادگی</label>
        <div class="input-wrapper"><input type="text" id="signup-name" placeholder="امیر رضایی"></div>
      </div>
      <div class="input-group">
        <label>ایمیل</label>
        <div class="input-wrapper"><input type="email" id="signup-email" placeholder="example@email.com"></div>
      </div>
      <div class="input-group">
        <label>رمز عبور</label>
        <div class="input-wrapper"><input type="password" id="signup-password" placeholder="حداقل ۶ کاراکتر"></div>
      </div>
      <button class="primary-btn" onclick="signupWithEmail()">ثبت‌نام</button>
      
      <div class="divider">یا</div>
      
      <button class="social-btn" onclick="signInWithGoogle()">G ثبت‌نام با گوگل</button>
    </div>

    <div class="footer">
      <span id="footer-text">حساب نداری؟</span> 
      <a href="#" id="switch-link" onclick="switchTab(1)">ثبت‌نام کن</a>
    </div>
  </div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBjGet-li1hqCmkd7OZkkv5e3GEJ_Zp18M",
  authDomain: "salichattest.firebaseapp.com",
  projectId: "salichattest",
  storageBucket: "salichattest.firebasestorage.app",
  messagingSenderId: "985509042175",
  appId: "1:985509042175:web:a29ce14b52956af7acb9ca"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function switchTab(tab) {
  document.getElementById('login-form').style.display = tab === 0 ? 'flex' : 'none';
  document.getElementById('signup-form').style.display = tab === 1 ? 'flex' : 'none';
  
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === tab);
  });
  
  document.getElementById('footer-text').textContent = tab === 0 ? 'حساب نداری؟' : 'حساب داری؟';
  document.getElementById('switch-link').textContent = tab === 0 ? 'ثبت‌نام کن' : 'ورود کن';
  document.getElementById('switch-link').onclick = () => switchTab(tab === 0 ? 1 : 0);
}

// Login with Email
async function loginWithEmail() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  
  if (!email || !password) return alert("ایمیل و رمز عبور را وارد کنید");
  
  try {
    const userCred = await auth.signInWithEmailAndPassword(email, password);
    alert("✅ ورود با موفقیت انجام شد!");
    window.location.href = "home.html"; // یا هر صفحه‌ای که می‌خوای
  } catch (err) {
    alert("❌ " + err.message);
  }
}

// Signup with Email
async function signupWithEmail() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  
  if (!name || !email || password.length < 6) return alert("همه فیلدها را به درستی پر کنید");
  
  try {
    const userCred = await auth.createUserWithEmailAndPassword(email, password);
    await userCred.user.updateProfile({ displayName: name });
    
    // ذخیره در Firestore
    await db.collection("users").doc(userCred.user.uid).set({
      uid: userCred.user.uid,
      displayName: name,
      email: email,
      createdAt: new Date().toISOString()
    });
    
    alert("✅ ثبت‌نام با موفقیت انجام شد! لطفاً ایمیل خود را تأیید کنید.");
  } catch (err) {
    alert("❌ " + err.message);
  }
}

// Google Sign In
async function signInWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    const result = await auth.signInWithPopup(provider);
    const user = result.user;
    
    // ذخیره اطلاعات
    await db.collection("users").doc(user.uid).set({
      uid: user.uid,
      displayName: user.displayName,
      email: user.email,
      photoURL: user.photoURL,
      createdAt: new Date().toISOString()
    }, { merge: true });
    
    alert("✅ ورود با گوگل با موفقیت انجام شد!");
    window.location.href = "home.html";
  } catch (err) {
    alert("❌ " + err.message);
  }
}

// Particles Effect
setInterval(() => {
  const p = document.createElement('div');
  p.style.position = 'fixed';
  p.style.width = '5px';
  p.style.height = '5px';
  p.style.background = '#a855f7';
  p.style.borderRadius = '50%';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.bottom = '-10px';
  p.style.opacity = '0.6';
  p.style.animation = 'float 10s linear forwards';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 10000);
}, 200);
</script>

<style>
@keyframes float {
  to { transform: translateY(-900px); opacity: 0; }
}
</style>
</body>
</html>
